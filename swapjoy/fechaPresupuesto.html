<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SwapJoy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-nav">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
            <img src="img/logo.png" class="logo-nav me-2">
            SwapJoy
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#crear">Crear</a></li>
                <li class="nav-item"><a class="nav-link" href="#participantes">Participantes</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<main class="flex-fill d-flex align-items-center">
    <section class="py-5 w-100">
        <div class="container pt-5 mt-5">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">

                    <div class="card-glass p-5">

                        <h2 class="fw-bold text-center mb-4">
                            Fecha y Presupuesto
                        </h2>

                        <!-- FECHA -->
                        <div class="mb-4">
                            <label class="form-label">Fecha del intercambio</label>
                            <input type="date"
                                   id="fechaEvento"
                                   class="form-control custom-input">
                        </div>

                        <!-- PRESUPUESTO -->
                        <div class="mb-3">
                            <label class="form-label">Presupuesto sugerido</label>

                            <select id="presupuestoSelect"
                                    class="form-select custom-input"
                                    onchange="mostrarInputPresupuesto()">
                                <option value="">Selecciona una opción</option>
                                <option value="200">$200</option>
                                <option value="300">$300</option>
                                <option value="500">$500</option>
                                <option value="1000">$1000</option>
                                <option value="otro">Otro...</option>
                            </select>
                        </div>

                        <!-- INPUT DINÁMICO -->
                        <div class="mb-4 d-none" id="inputPresupuestoContainer">
                            <input type="number"
                                   id="presupuestoPersonalizado"
                                   class="form-control custom-input"
                                   placeholder="Escribe otra cantidad">
                        </div>

                        <!-- BOTONES -->
                        <div class="row mt-3">
                            <div class="col-6">
                                <a href="evento.html"
                                   class="btn btn-gradient w-100 boton-presion">
                                    Atrás
                                </a>
                            </div>
                            <div class="col-6">
                                <button onclick="guardarFechaPresupuesto()"
                                        class="btn btn-gradient w-100 boton-presion">
                                    Continuar
                                </button>
                            </div>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </section>
</main>

<!-- FOOTER -->
<footer class="footer-custom text-white text-center py-4">
    <div class="footer-decoration">
        <span>S</span>
        <span>w</span>
        <span>a</span>
        <span>p</span>
        <span>J</span>
        <span>o</span>
        <span>y</span>
    </div>
    <p class="mb-1">© 2026 SwapJoy · Hecho con Amor</p>
    <small>Intercambios modernos y divertidos </small>
    <div class="mt-2">
        <span class="footer-frase"> Regalos con amor · Intercambios inolvidables</span>
    </div>
    <div class="mt-2">
        <span class="footer-hashtag">#SwapJoy - #IntercambiosFelices</span>
    </div>
</footer>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
