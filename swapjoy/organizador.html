<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SwapJoy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-nav">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
            <img src="img/logo.png" class="logo-nav me-2">
            SwapJoy
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#crear">Crear</a></li>
                <li class="nav-item"><a class="nav-link" href="#participantes">Participantes</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<main class="flex-fill d-flex align-items-center">
    <section class="py-5 fondo-dos w-100">
        <div class="container" style="margin-top:  100px;">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">

                    <div class="card-glass p-5">

                        <h2 class="fw-bold text-center mb-4">
                            ¿Quién organiza el intercambio?
                        </h2>

                        <div class="mb-3">
                            <input 
                                type="text" 
                                id="nombreOrganizador" 
                                class="form-control custom-input"
                                placeholder="Nombre">
                            <div id="error" class="text-danger mt-2" style="display:none;">
                                Introduce tu nombre.
                            </div>
                            <input 
                                type="email" 
                                id="correoOrganizador" 
                                class="form-control custom-input"
                                placeholder="Correo electrónico">
                            <div id="error" class="text-danger mt-2" style="display:none;">
                                Introduce tu correo.
                            </div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="incluyeOrganizador" checked>
                            <label class="form-check-label">
                                ¿Se incluye el organizador al sorteo?
                            </label>
                        </div>

                        <div class="row mt-3">
                            <div class="col-6">
                                <a href="index.html" class="btn btn-gradient w-100 boton-presion">
                                    Atrás
                                </a>
                            </div>
                            <div class="col-6">
                                <button onclick="guardarOrganizador()" class="btn btn-gradient w-100 boton-presion">
                                    Continuar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<!-- FOOTER -->
<footer class="footer-custom text-white text-center py-4">
    <div class="footer-decoration">
        <span>S</span>
        <span>w</span>
        <span>a</span>
        <span>p</span>
        <span>J</span>
        <span>o</span>
        <span>y</span>
    </div>
    <p class="mb-1">© 2026 SwapJoy · Hecho con Amor</p>
    <small>Intercambios modernos y divertidos </small>
    <div class="mt-2">
        <span class="footer-frase"> Regalos con amor · Intercambios inolvidables</span>
    </div>
    <div class="mt-2">
        <span class="footer-hashtag">#SwapJoy - #IntercambiosFelices</span>
    </div>
</footer>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
